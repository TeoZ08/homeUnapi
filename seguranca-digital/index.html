<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Simulador educativo para reconhecer golpes por WhatsApp, e-mail e SMS nas oficinas da UnAPI UFMS."
    />
    <title>Desafio Antigolpe - UnAPI UFMS</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/seguranca-digital.css" />
  </head>
  <body class="security-page portal-page has-page-overlay">
    <a class="security-skip-link" href="#challenge-app">Ir para o desafio</a>

    <main class="page-shell security-shell">
      <header class="topbar" aria-label="Cabeçalho do portal">
        <div class="brand">
          <small>UNAPI UFMS</small>
          <strong>Desafio Antigolpe</strong>
        </div>

        <nav class="topnav" aria-label="Navegação principal">
          <a href="../">Home</a>
          <a href="../ferramentas/">Ferramentas</a>
        </nav>
      </header>

      <section id="challenge-app" class="challenge-app" aria-label="Simulador de segurança digital"></section>
      <p id="challenge-announcement" class="sr-only" aria-live="polite"></p>

      <footer class="institutional-footer" aria-label="Logos institucionais">
        <div class="logos-footer">
          <img src="../img/ufms.webp" alt="UFMS" />
          <img class="logo-unapi" src="../img/unapi.webp" alt="UnAPI" />
          <img class="logo-gov" src="../img/gov-federal.webp" alt="Governo Federal" />
          <img src="../img/facom.webp" alt="FACOM" />
          <img src="../img/pet-sistemas.webp" alt="PET Sistemas" />
          <img class="logo-pet-computacao" src="../img/pet-computacao.webp" alt="PET Computação" />
        </div>
        <div class="footer-note">Portal das Oficinas de Informática • UNAPI UFMS</div>
      </footer>
    </main>

    <script src="../js/seguranca-digital.js" defer></script>
  </body>
</html>
